<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MEXC Scalp Panel — options</title>
  <style>
    body { font-family: -apple-system, Segoe UI, sans-serif; padding: 20px; min-width: 400px; background: #1e1e1e; color: #ddd; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #aaa; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 8px; font-family: monospace; font-size: 12px; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px; }
    button { margin-top: 12px; padding: 8px 16px; background: #3a7; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #4c8; }
    .status { margin-top: 10px; font-size: 12px; min-height: 16px; }
    .status.ok  { color: #6c6; }
    .status.err { color: #f66; }
    .help { font-size: 11px; color: #888; margin-top: 6px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>MEXC Scalp Panel — options</h1>
  <label for="balanceKey">Balance API Key</label>
  <input type="text" id="balanceKey" placeholder="paste the key here" autocomplete="off" spellcheck="false">
  <p class="help">Required to fetch wallet balance from the webhook service. Must match the <code>BALANCE_API_KEY</code> environment variable on the Railway mexc-webhook deployment. Stored only in <code>chrome.storage.local</code>.</p>
  <button id="save">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
